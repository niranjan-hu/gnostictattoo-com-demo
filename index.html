<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnostictattoo | Premium Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #f5f5f5; }
        .hero-img { object-fit: cover; filter: grayscale(20%) contrast(1.1); }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black min-h-screen flex flex-col">
    <nav class="w-full px-8 py-6 flex justify-between items-center border-b border-white/10">
        <h1 class="text-xl font-semibold tracking-tighter uppercase">Gnostictattoo</h1>
        <div class="hidden md:flex gap-8 text-sm uppercase tracking-widest text-white/60">
            <a href="#" class="hover:text-white transition-colors">Services</a>
            <a href="#" class="hover:text-white transition-colors">Studio</a>
            <a href="#" class="hover:text-white transition-colors">Contact</a>
        </div>
    </nav>
    <main class="flex-grow flex flex-col md:flex-row items-stretch">
        <div class="w-full md:w-1/2 p-12 md:p-24 flex flex-col justify-center">
            <h2 class="text-5xl md:text-7xl font-light tracking-tighter leading-tight mb-8">Elevate<br>Your<br>Standard.</h2>
            <p class="text-lg text-white/50 max-w-md mb-12">Experience uncompromising quality and meticulous attention to detail at Gnostictattoo. Redefining aesthetics for the modern era.</p>
            <button class="w-fit px-8 py-4 bg-white text-black text-sm uppercase tracking-widest font-semibold hover:bg-white/90 transition-all">Book Appointment</button>
        </div>
        <div class="w-full md:w-1/2 h-[50vh] md:h-auto relative">
            <img src="https://images.pexels.com/photos/4662164/pexels-photo-4662164.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940" alt="Gnostictattoo" class="absolute inset-0 w-full h-full hero-img" />

    </main>
    <footer class="p-8 border-t border-white/10 text-center text-xs text-white/40 uppercase tracking-widest">
        &copy; 2024 Gnostictattoo. All rights reserved.
    </footer>
